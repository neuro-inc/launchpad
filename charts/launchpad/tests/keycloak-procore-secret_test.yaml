suite: keycloak procore secret
templates:
  - templates/secret-keycloak-procore.yaml
tests:
  - it: renders the procore secret when integration is enabled
    values:
      - ../ci/procore-values.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: launchpad-keycloak-procore
      - equal:
          path: stringData.PROCORE_CLIENT_ID
          value: test-client-id
      - equal:
          path: stringData.PROCORE_CLIENT_SECRET
          value: test-client-secret
      - equal:
          path: stringData.PROCORE_AUTHORIZATION_URL
          value: https://login.procore.com/oauth/authorize
      - equal:
          path: stringData.PROCORE_TOKEN_URL
          value: https://login.procore.com/oauth/token
      - equal:
          path: stringData.PROCORE_ME_URL
          value: https://api.procore.com/rest/v1.0/me
  - it: does not render the procore secret when integration is disabled
    values:
      - ../ci/procore-values.yaml
    set:
      keycloakProcore.enabled: false
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.PROCORE_CLIENT_ID
          value: ""
      - equal:
          path: stringData.PROCORE_CLIENT_SECRET
          value: ""
