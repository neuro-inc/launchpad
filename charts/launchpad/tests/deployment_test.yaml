suite: deployment env wiring
templates:
  - templates/deployment-launchpad.yaml
tests:
  - it: sets KEYCLOAK_IDP_HINT when procore integration is enabled
    values:
      - ../ci/procore-values.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KEYCLOAK_IDP_HINT
            value: procore
  - it: does not set KEYCLOAK_IDP_HINT when procore integration is disabled
    values:
      - ../ci/procore-values.yaml
    set:
      keycloakProcore.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: KEYCLOAK_IDP_HINT
